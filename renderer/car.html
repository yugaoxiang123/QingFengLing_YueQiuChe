<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 小车行驶模拟（带随机障碍物）</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">
        控制说明：<br>
        ↑ / W：前进<br>
        ↓ / S：后退<br>
        ← / A：左转<br>
        → / D：右转<br>
        R：重置小车位置<br>
        Space：重新生成障碍物
    </div>

    <script type="module">
        // 导入 Three.js
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // 1. 初始化核心组件
        let scene, camera, renderer, controls;
        let car, obstacles = [];
        const carSpeed = 0.1;
        const carRotationSpeed = 0.02;
        
        // 键盘状态跟踪
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            w: false,
            s: false,
            a: false,
            d: false,
            r: false,
            ' ': false
        };

        // 初始化函数
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 天空蓝背景

            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);
            camera.lookAt(0, 0, 0);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // 添加坐标轴辅助
            const axesHelper = new THREE.AxesHelper(10);
            scene.add(axesHelper);

            // 创建地面
            createGround();

            // 创建小车
            createCar();

            // 生成随机障碍物
            generateObstacles(20);

            // 添加事件监听
            addEventListeners();

            // 开始动画循环
            animate();
        }

        // 创建地面
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x3d9970,
                side: THREE.DoubleSide
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            
            // 添加网格线
            const gridHelper = new THREE.GridHelper(100, 50, 0x000000, 0x000000);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);
            scene.add(ground);
        }

        // 创建小车
        function createCar() {
            // 小车组
            car = new THREE.Group();
            
            // 车身
            const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 0.5;
            car.add(carBody);
            
            // 车顶
            const roofGeometry = new THREE.BoxGeometry(1.5, 0.8, 2);
            const roofMaterial = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.set(0, 1.3, -0.5);
            car.add(roof);
            
            // 车轮
            const wheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            
            // 前轮左
            const frontLeftWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            frontLeftWheel.rotation.z = Math.PI / 2;
            frontLeftWheel.position.set(-0.8, 0, 1.2);
            car.add(frontLeftWheel);
            
            // 前轮右
            const frontRightWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            frontRightWheel.rotation.z = Math.PI / 2;
            frontRightWheel.position.set(0.8, 0, 1.2);
            car.add(frontRightWheel);
            
            // 后轮左
            const backLeftWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            backLeftWheel.rotation.z = Math.PI / 2;
            backLeftWheel.position.set(-0.8, 0, -1.2);
            car.add(backLeftWheel);
            
            // 后轮右
            const backRightWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            backRightWheel.rotation.z = Math.PI / 2;
            backRightWheel.position.set(0.8, 0, -1.2);
            car.add(backRightWheel);
            
            // 初始位置
            car.position.set(0, 0, 0);
            scene.add(car);
        }

        // 生成随机障碍物
        function generateObstacles(count) {
            // 清除现有障碍物
            obstacles.forEach(obstacle => scene.remove(obstacle));
            obstacles = [];

            const obstacleColors = [0x0000ff, 0xffff00, 0x800080, 0xffa500, 0x00ffff];
            
            for (let i = 0; i < count; i++) {
                // 随机大小
                const size = Math.random() * 1.5 + 0.5;
                const geometry = new THREE.BoxGeometry(size, size, size);
                
                // 随机颜色
                const color = obstacleColors[Math.floor(Math.random() * obstacleColors.length)];
                const material = new THREE.MeshStandardMaterial({ color });
                
                const obstacle = new THREE.Mesh(geometry, material);
                
                // 随机位置（避开小车初始位置）
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 80;
                    z = (Math.random() - 0.5) * 80;
                } while (Math.sqrt(x * x + z * z) < 5); // 确保障碍物离小车初始位置至少5个单位
                
                obstacle.position.set(x, size / 2, z);
                obstacle.userData.size = size; // 存储大小用于碰撞检测
                
                scene.add(obstacle);
                obstacles.push(obstacle);
            }
        }

        // 碰撞检测
        function checkCollision(x, z) {
            const carHalfSize = 1.5; // 小车碰撞盒半尺寸
            
            for (const obstacle of obstacles) {
                const obsX = obstacle.position.x;
                const obsZ = obstacle.position.z;
                const obsHalfSize = obstacle.userData.size / 2;
                
                // 轴对齐包围盒 (AABB) 碰撞检测
                if (
                    x + carHalfSize > obsX - obsHalfSize &&
                    x - carHalfSize < obsX + obsHalfSize &&
                    z + carHalfSize > obsZ - obsHalfSize &&
                    z - carHalfSize < obsZ + obsHalfSize
                ) {
                    return true; // 碰撞
                }
            }
            
            // 边界检测（防止小车驶出地面）
            if (Math.abs(x) > 45 || Math.abs(z) > 45) {
                return true;
            }
            
            return false;
        }

        // 更新小车位置
        function updateCar() {
            if (keys.ArrowUp || keys.w) {
                // 前进
                const forwardX = Math.sin(car.rotation.y) * carSpeed;
                const forwardZ = Math.cos(car.rotation.y) * carSpeed;
                const newX = car.position.x + forwardX;
                const newZ = car.position.z - forwardZ;
                
                if (!checkCollision(newX, newZ)) {
                    car.position.x = newX;
                    car.position.z = newZ;
                }
            }
            
            if (keys.ArrowDown || keys.s) {
                // 后退
                const backwardX = Math.sin(car.rotation.y) * carSpeed;
                const backwardZ = Math.cos(car.rotation.y) * carSpeed;
                const newX = car.position.x - backwardX;
                const newZ = car.position.z + backwardZ;
                
                if (!checkCollision(newX, newZ)) {
                    car.position.x = newX;
                    car.position.z = newZ;
                }
            }
            
            if (keys.ArrowLeft || keys.a) {
                // 左转
                car.rotation.y += carRotationSpeed;
            }
            
            if (keys.ArrowRight || keys.d) {
                // 右转
                car.rotation.y -= carRotationSpeed;
            }
            
            if (keys.r) {
                // 重置位置
                car.position.set(0, 0, 0);
                car.rotation.y = 0;
                keys.r = false; // 防止持续重置
            }
            
            if (keys[' ']) {
                // 重新生成障碍物
                generateObstacles(20);
                keys[' '] = false; // 防止持续生成
            }
        }

        // 添加事件监听
        function addEventListeners() {
            // 键盘按下
            document.addEventListener('keydown', (e) => {
                if (keys.hasOwnProperty(e.key)) {
                    keys[e.key] = true;
                }
            });
            
            // 键盘释放
            document.addEventListener('keyup', (e) => {
                if (keys.hasOwnProperty(e.key)) {
                    keys[e.key] = false;
                }
            });
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新控制器
            controls.update();
            
            // 更新小车状态
            updateCar();
            
            // 渲染场景
            renderer.render(scene, camera);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
